<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Portal</title>
  <style>
    :root { --border:#e5e7eb; --bg:#fff; --muted:#6b7280; --link:#2563eb; }
    body{font-family:Arial,system-ui;margin:0;height:100vh;display:flex;background:var(--bg)}
    aside{width:320px;border-right:1px solid var(--border);padding:14px;box-sizing:border-box}
    main{flex:1;padding:14px;box-sizing:border-box}
    input,select,button{width:100%;padding:10px;margin:6px 0;box-sizing:border-box}
    button{cursor:pointer}
    .row{margin:8px 0}
    .muted{color:var(--muted);font-size:12px}
    .sec{margin-top:14px}
    .sec h4{margin:10px 0 6px 0}
    a{display:block;padding:6px 0;color:var(--link);text-decoration:none}
    a:hover{text-decoration:underline}
    iframe{width:100%;height:86vh;border:1px solid var(--border);border-radius:8px}
    .pill{display:inline-block;padding:2px 8px;border:1px solid var(--border);border-radius:999px;font-size:12px;margin-left:6px;color:var(--muted)}
    .danger{color:#b91c1c}
  </style>
</head>
<body>
  <aside>
    <div class="row">
      <label class="muted">API base (backend)</label>
      <input id="apiBase" placeholder="https://<user>.pythonanywhere.com" />
      <div class="muted">Astuce: mets ça en variable Vercel via <span class="pill">window.__APP_CONFIG__</span> (voir app.js)</div>
    </div>

    <div class="row">
      <label class="muted">site_id</label>
      <input id="siteId" value="portalA" />
    </div>

    <div class="sec">
      <h4>Login</h4>
      <input id="email" placeholder="email" autocomplete="username" />
      <input id="password" placeholder="password" type="password" autocomplete="current-password" />
      <button id="btnLogin">Login</button>
      <button id="btnLogout">Logout</button>
      <div class="muted">Token stocké en localStorage (simple). Tu peux l’enlever plus tard.</div>
    </div>

    <div class="sec">
      <h4>Vue (audience)</h4>
      <select id="audience"></select>
      <button id="btnSetAudience">Activer la vue</button>
      <div class="muted">La vue active est stockée côté serveur (active_context).</div>
    </div>

    <div class="sec">
      <h4>Menu</h4>
      <button id="btnLoadMenu">Charger menu</button>
      <div id="menu"></div>
    </div>

    <div class="sec muted" id="status"></div>
  </aside>

  <main>
    <div class="row">
      <strong>Page</strong>
      <span class="pill" id="currentUrl">-</span>
    </div>
    <iframe id="frame" referrerpolicy="no-referrer"></iframe>
    <div class="muted">L’iframe appelle <span class="pill">/{site}/{section}/{page}?t=TOKEN</span></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
